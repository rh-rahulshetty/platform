        if: always()
        run: |
          echo "### Amber — Batch PR Fixer" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See step logs for per-PR details" >> $GITHUB_STEP_SUMMARY
