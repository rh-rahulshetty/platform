---
apiVersion: v1
kind: Service
metadata:
  name: ambient-api-server-db
  labels:
    app: ambient-api-server
    component: database
spec:
  ports:
    - name: postgresql
      port: 5432
      protocol: TCP
      targetPort: 5432
  selector:
    app: ambient-api-server
    component: database
  type: ClusterIP

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ambient-api-server-db-data
  labels:
    app: ambient-api-server
    component: database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ambient-api-server-db
  labels:
    app: ambient-api-server
    component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ambient-api-server
      component: database
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: ambient-api-server
        component: database
    spec:
      containers:
        - name: postgresql
          image: postgres:16
          ports:
            - containerPort: 5432
              name: postgresql
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  key: db.user
                  name: ambient-api-server-db
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: db.password
                  name: ambient-api-server-db
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  key: db.name
                  name: ambient-api-server-db
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: ambient-api-server-db-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: ambient-api-server-db-data
          persistentVolumeClaim:
            claimName: ambient-api-server-db-data
