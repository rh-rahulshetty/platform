apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: vteam-ambient-runner-base

resources:
- core
- rbac
- platform
- ambient-control-plane-service.yml
- ambient-control-plane-token-svc.yaml

# Default images (can be overridden by overlays)
images:
- name: quay.io/ambient_code/vteam_backend
  newTag: latest
- name: quay.io/ambient_code/vteam_frontend
  newTag: latest
- name: quay.io/ambient_code/vteam_operator
  newTag: latest
- name: quay.io/ambient_code/vteam_claude_runner
  newTag: latest
- name: quay.io/ambient_code/vteam_state_sync
  newTag: latest
- name: quay.io/ambient_code/vteam_public_api
  newTag: latest
- name: quay.io/ambient_code/vteam_api_server
  newTag: latest
- name: quay.io/ambient_code/vteam_control_plane
  newTag: latest
- name: quay.io/ambient_code/vteam_mcp
  newTag: latest
