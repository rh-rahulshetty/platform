apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentic-operator
  labels:
    app: agentic-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentic-operator
  template:
    metadata:
      labels:
        app: agentic-operator
    spec:
      serviceAccountName: agentic-operator
      containers:
      - name: agentic-operator
        image: quay.io/ambient_code/vteam_operator:latest
        imagePullPolicy: Always
        args:
        # Controller-runtime configuration
        - --max-concurrent-reconciles=10  # Process up to 10 sessions in parallel
        - --health-probe-bind-address=:8081
        - --leader-elect=false  # Enable for HA deployments with replicas > 1
        # Uncomment for debugging with legacy watch-based implementation:
        # - --legacy-watch
        ports:
        - containerPort: 8081
          name: health
          protocol: TCP
        env:
        # Controller concurrency (can be overridden via args)
        - name: MAX_CONCURRENT_RECONCILES
          value: "10"
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: BACKEND_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: BACKEND_API_URL
          value: "http://backend-service:8080/api"
        - name: AMBIENT_CODE_RUNNER_IMAGE
          value: "quay.io/ambient_code/vteam_claude_runner:latest"
        - name: IMAGE_PULL_POLICY
          value: "IfNotPresent"
        # Vertex AI configuration from ConfigMap (optional — set by setup-vertex-kind.sh or production overlay)
        - name: USE_VERTEX
          valueFrom:
            configMapKeyRef:
              name: operator-config
              key: USE_VERTEX
              optional: true
        - name: CLOUD_ML_REGION
          valueFrom:
            configMapKeyRef:
              name: operator-config
              key: CLOUD_ML_REGION
              optional: true
        - name: ANTHROPIC_VERTEX_PROJECT_ID
          valueFrom:
            configMapKeyRef:
              name: operator-config
              key: ANTHROPIC_VERTEX_PROJECT_ID
              optional: true
        - name: GOOGLE_APPLICATION_CREDENTIALS
          valueFrom:
            configMapKeyRef:
              name: operator-config
              key: GOOGLE_APPLICATION_CREDENTIALS
              optional: true
        # Platform-wide Langfuse observability configuration
        # All LANGFUSE_* config stored in ambient-admin-langfuse-secret (platform-admin managed)
        - name: LANGFUSE_ENABLED
          valueFrom:
            secretKeyRef:
              name: ambient-admin-langfuse-secret
              key: LANGFUSE_ENABLED
              optional: true  # Optional: defaults to false if secret doesn't exist
        - name: LANGFUSE_HOST
          valueFrom:
            secretKeyRef:
              name: ambient-admin-langfuse-secret
              key: LANGFUSE_HOST
              optional: true  # Optional: only needed if Langfuse enabled
        - name: LANGFUSE_PUBLIC_KEY
          valueFrom:
            secretKeyRef:
              name: ambient-admin-langfuse-secret
              key: LANGFUSE_PUBLIC_KEY
              optional: true  # Optional: only needed if Langfuse enabled
        - name: LANGFUSE_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: ambient-admin-langfuse-secret
              key: LANGFUSE_SECRET_KEY
              optional: true  # Optional: only needed if Langfuse enabled
        # MLflow tracing (runner); optional secret managed by platform admin
        - name: MLFLOW_TRACING_ENABLED
          valueFrom:
            secretKeyRef:
              name: ambient-admin-mlflow-observability-secret
              key: MLFLOW_TRACING_ENABLED
              optional: true
        - name: OBSERVABILITY_BACKENDS
          valueFrom:
            secretKeyRef:
              name: ambient-admin-mlflow-observability-secret
              key: OBSERVABILITY_BACKENDS
              optional: true
        # Google OAuth client credentials for workspace-mcp
        - name: GOOGLE_OAUTH_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: google-workflow-app-secret
              key: GOOGLE_OAUTH_CLIENT_ID
              optional: true
        - name: GOOGLE_OAUTH_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: google-workflow-app-secret
              key: GOOGLE_OAUTH_CLIENT_SECRET
              optional: true
        # Public backend URL used to build the OAuth redirect URI injected into runner pods.
        # Must match the redirect URI registered in the Google Cloud Console OAuth app.
        - name: BACKEND_PUBLIC_URL
          valueFrom:
            secretKeyRef:
              name: google-workflow-app-secret
              key: BACKEND_URL
              optional: true
        # S3 state sync configuration (defaults - can be overridden per-project in settings)
        - name: STATE_SYNC_IMAGE
          value: "quay.io/ambient_code/vteam_state_sync:latest"
        - name: S3_ENDPOINT
          value: "http://minio.ambient-code.svc:9000"  # In-cluster MinIO (change for external S3)
        - name: S3_BUCKET
          value: "ambient-sessions"  # Create this bucket in MinIO console
        # Inactivity auto-stop configuration
        # - name: DEFAULT_INACTIVITY_TIMEOUT
        #   value: "86400"  # Default inactivity timeout in seconds (24h). Set to 0 to disable.
        # OpenTelemetry configuration
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "otel-collector.ambient-code.svc:4317"  # Deploy OTel collector separately
        - name: DEPLOYMENT_ENV
          value: "production"
        - name: VERSION
          value: "latest"  # Override with actual version in production
        # Go memory limit — tells GC to be aggressive before hitting container limit.
        # Set to ~87.5% of memory limit (4Gi) per Go best practices.
        - name: GOMEMLIMIT
          value: "3500MiB"
        volumeMounts:
        # Model manifest (mounted ConfigMap — kubelet auto-syncs changes)
        - name: model-manifest
          mountPath: /config/models
          readOnly: true
        # Agent registry (runner type definitions — kubelet auto-syncs changes)
        - name: agent-registry
          mountPath: /config/registry
          readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 4Gi
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      # Model manifest ConfigMap (single source of truth for available models)
      - name: model-manifest
        configMap:
          name: ambient-models
          optional: true  # Don't fail if ConfigMap not yet created
      # Agent registry ConfigMap (runner type definitions)
      - name: agent-registry
        configMap:
          name: ambient-agent-registry
          optional: true  # Don't fail if ConfigMap not yet created
      restartPolicy: Always
