apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ambient-code

# Resources (base + kind-specific)
resources:
- ../../base
- secrets.yaml
- test-user.yaml
# Ingress removed - using NodePort for direct access in kind
- operator-config.yaml
- minio-credentials.yaml
- postgresql-credentials.yaml
- unleash-credentials.yaml

components:
- ../../components/postgresql-init-scripts

# Patches for kind environment
patches:
- path: ambient-api-server-jwks-patch.yaml
  target:
    kind: ConfigMap
    name: ambient-api-server-auth
- path: namespace-patch.yaml
  target:
    kind: Namespace
    name: ambient-code
- path: pvc-patch.yaml
  target:
    kind: PersistentVolumeClaim
    name: backend-state-pvc
- path: minio-pvc-patch.yaml
  target:
    kind: PersistentVolumeClaim
    name: minio-data
- path: frontend-test-patch.yaml
  target:
    kind: Deployment
    name: frontend
- path: operator-env-patch.yaml
  target:
    kind: Deployment
    name: agentic-operator
- path: frontend-service-nodeport.yaml
  target:
    kind: Service
    name: frontend-service
- path: public-api-service-nodeport.yaml
  target:
    kind: Service
    name: public-api-service
# PostgreSQL: smaller PVC for local dev
- path: postgresql-pvc-patch.yaml
  target:
    kind: PersistentVolumeClaim
    name: postgresql-data
# JSON patches to set imagePullPolicy for all deployments
- path: image-pull-policy-patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: backend-api
- path: image-pull-policy-patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: frontend
- path: image-pull-policy-patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: agentic-operator
- path: image-pull-policy-patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: public-api

# Kind overlay: Use Quay.io production images by default
# For local development with local images, use overlays/kind-local/ instead
images:
- name: quay.io/ambient_code/vteam_backend
  newTag: latest
- name: quay.io/ambient_code/vteam_frontend
  newTag: latest
- name: quay.io/ambient_code/vteam_operator
  newTag: latest
- name: quay.io/ambient_code/vteam_public_api
  newTag: latest
