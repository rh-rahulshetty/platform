apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: vteam-openshift-dev

namespace: ambient-code

resources:
- ../production

patches:
- path: ambient-api-server-env-patch.yaml
  target:
    group: apps
    kind: Deployment
    name: ambient-api-server
    version: v1
- path: ambient-api-server-args-patch.yaml
  target:
    group: apps
    kind: Deployment
    name: ambient-api-server
    version: v1
