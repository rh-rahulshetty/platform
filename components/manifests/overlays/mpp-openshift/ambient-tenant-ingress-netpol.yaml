apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ambient-tenant-ingress
  namespace: ambient-code--runtime-int
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              tenant.paas.redhat.com/tenant: ambient-code
      ports:
        - port: 8000
          protocol: TCP
        - port: 9000
          protocol: TCP
