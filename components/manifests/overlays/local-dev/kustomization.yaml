apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vteam-dev

# Resources (base + local-dev-specific)
resources:
- ../../base
- ambient-api-server-route.yaml
- build-configs.yaml
- dev-users.yaml
- frontend-auth.yaml
- backend-route.yaml
- frontend-route.yaml
- operator-config-crc.yaml
- unleash-credentials.yaml
- unleash-route.yaml

# Patches for local dev environment
patches:
# Strategic merge patches
- path: backend-deployment-patch.yaml
- path: frontend-deployment-patch.yaml
- path: operator-patch.yaml
- path: pvc-patch.yaml
- path: backend-clusterrole-patch.yaml
- path: operator-clusterrole-patch.yaml
# Ambient API Server: enable end-to-end TLS (OpenShift service-ca provides certs)
- path: ambient-api-server-tls-patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: ambient-api-server
- path: ambient-api-server-service-ca-patch.yaml
  target:
    version: v1
    kind: Service
    name: ambient-api-server
# Ambient API Server DB: fix db.host for vteam- namePrefix
- path: ambient-api-server-db-credentials-patch.yaml
# Ambient API Server: init container to wait for DB and create database
- path: ambient-api-server-init-db-patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: ambient-api-server
# Unleash: init container to create database (RHEL doesn't support init scripts)
- path: unleash-init-db-patch.yaml
# PostgreSQL: use RHEL image with proper env vars and mount paths (JSON patch)
- path: postgresql-json-patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: postgresql
- path: ambient-api-server-db-json-patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: ambient-api-server-db

# Name prefix for local dev resources
namePrefix: vteam-

# Images for local dev (internal registry)
images:
- name: quay.io/ambient_code/vteam_backend
  newName: image-registry.openshift-image-registry.svc:5000/vteam-dev/vteam-backend
  newTag: latest
- name: quay.io/ambient_code/vteam_frontend
  newName: image-registry.openshift-image-registry.svc:5000/vteam-dev/vteam-frontend
  newTag: latest
- name: quay.io/ambient_code/vteam_operator
  newName: image-registry.openshift-image-registry.svc:5000/vteam-dev/vteam-operator
  newTag: latest
- name: quay.io/ambient_code/vteam_claude_runner
  newName: quay.io/ambient_code/vteam_claude_runner
  newTag: latest
- name: quay.io/ambient_code/vteam_api_server
  newName: quay.io/ambient_code/vteam_api_server
  newTag: latest
# PostgreSQL: RHEL image handled via JSON patch (postgresql-json-patch.yaml)
