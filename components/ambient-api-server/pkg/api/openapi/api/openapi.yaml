  /api/ambient/v1/sessions/{id}/messages:
    get:
      description: |-
        Returns messages for a session after the given sequence number.
        Set `Accept: text/event-stream` to receive a real-time SSE stream
        instead of a JSON array. The stream replays existing messages first,
        then pushes new ones as they arrive. Keep-alive comments (`: keep-alive`)
        are sent every 15 seconds.
      parameters:
      - description: The id of record
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      - description: Return only messages with seq greater than this value (default
          0 = all messages)
        in: query
        name: after_seq
        required: false
        schema:
          default: 0
          format: int64
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionMessageList"
            text/event-stream:
              schema:
                description: |-
                  Server-Sent Events stream. Each event is a JSON-encoded
                  SessionMessage prefixed with `data: ` and terminated by
                  a blank line. Example:

                  data: {"id":"...","session_id":"...","seq":1,...}
                type: string
          description: |-
            JSON array of messages (default), or SSE stream when
            `Accept: text/event-stream` is set.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Auth token is invalid
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized to perform operation
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: No session with specified id exists
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unexpected error occurred
      security:
      - Bearer: []
      summary: List or stream session messages
    post:
      description: |-
        Appends a message to the session's message log. The message is
        assigned a monotonically increasing sequence number. Subscribers
        on the SSE stream will receive the message immediately.
      parameters:
      - description: The id of record
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionMessagePushRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionMessage"
          description: Message created
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Invalid request body
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Auth token is invalid
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized to perform operation
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: No session with specified id exists
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unexpected error occurred
      security:
      - Bearer: []
      summary: Push a message to a session
components:
  parameters:
    id:
      description: The id of record
      explode: false
      in: path
      name: id
      required: true
      schema:
        type: string
      style: simple
    page:
      description: Page number of record list when record list exceeds specified page
        size
      explode: true
      in: query
      name: page
      required: false
      schema:
        default: 1
        minimum: 1
        type: integer
      style: form
    size:
      description: Maximum number of records to return
      explode: true
      in: query
      name: size
      required: false
      schema:
        default: 100
        minimum: 0
        type: integer
      style: form
    search:
      description: Specifies the search criteria
      explode: true
      in: query
      name: search
      required: false
      schema:
        type: string
      style: form
    orderBy:
      description: Specifies the order by criteria
      explode: true
      in: query
      name: orderBy
      required: false
      schema:
        type: string
      style: form
    fields:
      description: Supplies a comma-separated list of fields to be returned
      explode: true
      in: query
      name: fields
      required: false
      schema:
        type: string
      style: form
  schemas:
    ObjectReference:
      properties:
        id:
          type: string
        kind:
          type: string
        href:
          type: string
        created_at:
          format: date-time
          type: string
        updated_at:
          format: date-time
          type: string
      type: object
    List:
      properties:
        kind:
          type: string
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer
      required:
      - items
      - kind
      - page
      - size
      - total
      type: object
    Error:
      allOf:
      - $ref: "#/components/schemas/ObjectReference"
      - properties:
          code:
            type: string
          reason:
            type: string
          operation_id:
            type: string
        type: object
      example:
        reason: reason
        code: code
        updated_at: 2000-01-23T04:56:07.000+00:00
        kind: kind
        created_at: 2000-01-23T04:56:07.000+00:00
        operation_id: operation_id
        id: id
        href: href
    Session:
      allOf:
      - $ref: "#/components/schemas/ObjectReference"
      - properties:
          name:
            type: string
          repo_url:
            type: string
          prompt:
            type: string
